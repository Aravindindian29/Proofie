<!DOCTYPE html>
<html>
<head>
    <title>Asset Viewer</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .asset-info { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .asset-viewer { width: 100%; height: 80vh; border: 1px solid #ddd; }
        .back-button { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Proofie Asset Viewer</h1>
            <a href="javascript:history.back()" class="back-button">← Back</a>
        </div>
        
        <div class="asset-info">
            <h2 id="asset-name">Loading...</h2>
            <p id="asset-type">Type: Loading...</p>
            <p id="asset-size">Size: Loading...</p>
        </div>
        
        <div id="asset-container">
            <div class="asset-viewer" id="viewer">
                <p style="text-align: center; padding: 50px;">Loading asset...</p>
            </div>
        </div>
    </div>

    <script>
        // Get asset info from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const assetUrl = urlParams.get('url');
        const assetName = urlParams.get('name') || 'Unknown Asset';
        const assetType = urlParams.get('type') || 'unknown';

        if (assetUrl) {
            document.getElementById('asset-name').textContent = assetName;
            document.getElementById('asset-type').textContent = `Type: ${assetType}`;
            
            const viewer = document.getElementById('viewer');
            
            if (assetType === 'image') {
                viewer.innerHTML = `<img src="${assetUrl}" style="max-width: 100%; max-height: 100%; object-fit: contain;" alt="${assetName}">`;
            } else if (assetType === 'pdf') {
                viewer.innerHTML = `<iframe src="${assetUrl}" style="width: 100%; height: 100%; border: none;"></iframe>`;
            } else if (assetType === 'video') {
                viewer.innerHTML = `<video controls style="width: 100%; height: 100%;"><source src="${assetUrl}" type="video/mp4">Your browser does not support video.</video>`;
            } else {
                viewer.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h3>Preview not available</h3>
                        <p>File type: ${assetType}</p>
                        <a href="${assetUrl}" download="${assetName}" style="background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Download File</a>
                    </div>
                `;
            }
        } else {
            document.getElementById('asset-name').textContent = 'Error';
            document.getElementById('viewer').innerHTML = '<p style="text-align: center; padding: 50px; color: red;">No asset URL provided</p>';
        }
    </script>
</body>
</html>
